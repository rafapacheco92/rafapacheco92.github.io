<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="tabs.css">
    <title>TABS</title>
</head>
<body>
    <div class="tab">
        <button id="tabPadrao" class="ativo tabButton" onclick="abreTab(event, 'cadastroTab')">CADASTRO</button>
        <button class="tabButton" onclick="abreTab(event, 'loginTab')">LOGIN</button>
    </div>
    <div id="cadastroTab" class="conteudo">
        <h3>CADASTRE-SE</h3>
        <p><form class="classForm" action="./cadastro.html">
            <label for="nomeInp" class="labelCadastro"
              >Nome Completo<label class="campoObrigatorio">*</label></label
            >
            <input
              type="text"
              id="nomeInp"
              name="nomeInp"
              placeholder="Nome"
              required
            />
            <label for="celularInp" class="labelCadastro"
              >Celular<label class="campoObrigatorio">*</label></label
            >
            <input
              type="text"
              id="celularInp"
              name="celularInp"
              placeholder="Número do Celular"
              required
            />
            <div id="celularIncorreto"></div>
            <label for="senhaInp" class="labelCadastro"
              >Senha<label class="campoObrigatorio">*</label></label
            >
            <input
              type="password"
              id="senhaInp"
              name="senhaInp"
              placeholder="Senha"
              required
            />
            <label for="confirmaSenhaInp" class="labelCadastro"
              >Confirme a Senha<label class="campoObrigatorio"
                >*</label
              ></label
            >
            <input
              type="password"
              id="confirmaSenhaInp"
              name="confirmaSenhaInp"
              placeholder="Confirme a senha"
              required
            />
            <div id="senhaNaoConfere"></div>
            <label for="emailInp" class="labelCadastro"
              >Email<label class="campoObrigatorio">*</label></label
            >
            <input
              type="email"
              id="emailInp"
              name="emailInp"
              placeholder="Email"
              required
            />
            <label for="confirmaEmailInp" class="labelCadastro"
              >Confirme seu Email<label class="campoObrigatorio"
                >*</label
              ></label
            >
            <input
              type="email"
              id="confirmaEmailInp"
              name="confirmaEmailInp"
              placeholder="Confirme o Email"
              required
            />
            <div id="emailNaoConfere"></div>
            <label for="interesse"></label>
            <select name="interesse" id="interesseInp" required>
              <option value="profissional">Bartender Profissional</option>
              <option value="4fun">Bartender 4 Fun</option>
              <option value="aprendiz">Aprendiz</option>
              <option value="iniciante">Totalmente Iniciante</option>
            </select>
            <div class="checkbox">
              <input
                type="checkbox"
                id="maiorIdade"
                name="maiorIdade"
                value="afirmo"
                required
              /><label for="maiorIdade"
                >Declaro que sou maior de 18 anos.</label
              >
            </div>
            <div class="checkbox">
              <input
                type="checkbox"
                id="concordoTermos"
                name="concordoTermos"
                value="afirmo"
                required
              /><label for="maiorIdade"
                >Concordo com os
                <a href="">termos de responsabilidade.</a></label
              >
            </div>
            <button class="buttonCadastro" onclick="criaConta()">
              Criar conta
            </button>
          </form></p>
    </div>

    <div id="loginTab" class="conteudo">
        <h3>LOGIN</h3>
        <form action="login">
            <label for="emailInp" class="labelCadastro"
              >Email<label class="campoObrigatorio">*</label></label
            >
            <input
              type="email"
              id="emailLoginInp"
              name="emailLoginInp"
              placeholder="Email"
              required
            />
            <label for="senhaInp" class="labelCadastro"
              >Senha<label class="campoObrigatorio">*</label></label
            >
            <input
              type="password"
              id="senhaLoginInp"
              name="senhaLoginInp"
              placeholder="Senha"
              required
            />
        </form>
    </div>

    <script src="landing.js"></script>
</body>
</html>
